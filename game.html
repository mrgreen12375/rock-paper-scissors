<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./assets/style.css"/>
    <title>Rock Paper Scissors</title>
</head>
<body>
    <header>
        <h1>Rock - Paper - Scissors</h1>
    </header>
    <main>
        <section class="gameBoarder">
            <div class="gameDisplay">
                <div>
                    <h2>Player</h2>
                    <img class="player1" src="./assets/images/rock.png" />
                </div>
                <h3>VS</h3>
                <div>
                    <h2>CPU</h2>
                    <img class="player2" src="./assets/images/scissors.png" />
                </div>
            </div>
            <div class="gameOptions">
                <h2>Choose Your Weapon</h2>
                <div class="gameOptionsList">
                    <img src="./assets/images/rock.png" />
                    <img src="./assets/images/paper.png" />
                    <img src="./assets/images/scissors.png" />
                </div>
            </div>
        </section>
    </main>
</body>
</html>
