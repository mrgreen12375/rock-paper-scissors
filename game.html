<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./assets/css/style.css"/>
    <title>Rock Paper Scissors</title>
</head>
<body>
    <header>
        <h1>Rock - Paper - Scissors</h1>
    </header>
    <main>
        <section class="gameBoarder">
            <div class="gameDisplay">
                <div>
                    <div id="playerResults"></div>
                    <h2>Player</h2>
                    <div id="playerCard">
                        <img class="player" src="./assets/images/rock.png" />
                    </div>
                </div>
                <h3>VS</h3>
                <div>
                    <div id="cpuResults"></div>
                    <h2>CPU</h2>
                    <div id="cpuCard">
                        <img class="cpu" src="./assets/images/scissors.png" />
                    </div>
                </div>
            </div>
            <div class="gameOptions">
                <h2>Choose Your Weapon</h2>
                <div class="gameOptionsList">
                    <img id="rock" src="./assets/images/rock.png" />
                    <img id="paper" src="./assets/images/paper.png" />
                    <img id="scissors" src="./assets/images/scissors.png" />
                </div>
            </div>
        </section>
    </main>

<script src="./assets/js/script.js"></script>

</body>
</html>
